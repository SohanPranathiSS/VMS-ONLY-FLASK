# Development Docker Compose Configuration
version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vms_backend_dev
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - backend_logs:/app/logs
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=sqlite:///app.db
      - SECRET_KEY=dev-secret-key
      - JWT_SECRET_KEY=dev-jwt-secret
    depends_on:
      - redis
    networks:
      - vms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: development
    container_name: vms_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_ENV=development
    depends_on:
      - backend
    networks:
      - vms_network
    restart: unless-stopped

  # ML Service
  ml_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    container_name: vms_ml_dev
    ports:
      - "5001:5001"
    volumes:
      - ./ML:/app
      - ml_uploads:/app/static/uploads
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    networks:
      - vms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vms_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - vms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Development Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: vms_nginx_dev
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - vms_network
    restart: unless-stopped
    profiles:
      - proxy

# Networks
networks:
  vms_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  backend_logs:
    driver: local
  ml_uploads:
    driver: local
  redis_data:
    driver: local
