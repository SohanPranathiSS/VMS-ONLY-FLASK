# Production Deployment Configuration
# Docker Compose for Visitor Management System V3

version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: vms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Flask Backend API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: vms_backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_NAME=${MYSQL_DATABASE}
      - DATABASE_USER=${MYSQL_USER}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    ports:
      - "5000:5000"
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: vms_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - vms_network

  # ML Service (Optional)
  ml_service:
    build:
      context: ./ML
      dockerfile: Dockerfile
    container_name: vms_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ML/uploads:/app/uploads
    networks:
      - vms_network
    profiles:
      - ml-enabled

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./Frontend/build:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - vms_network

  # Redis (for session management and caching)
  redis:
    image: redis:alpine
    container_name: vms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vms_network
    command: redis-server --appendonly yes

volumes:
  mysql_data:
  redis_data:

networks:
  vms_network:
    driver: bridge
