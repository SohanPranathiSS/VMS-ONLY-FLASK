name: Dependency Security Scan

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  push:
    branches: [ main ]
    paths:
      - 'Backend/requirements.txt'
      - 'Frontend/package.json'
      - 'Frontend/package-lock.json'
      - 'ML/requirements.txt'

jobs:
  python-security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install safety
      run: |
        pip install safety
    
    - name: Scan Backend dependencies
      run: |
        cd Backend
        safety check -r requirements.txt --json > backend-security-report.json || true
        safety check -r requirements.txt
    
    - name: Scan ML dependencies
      run: |
        cd ML
        safety check -r requirements.txt --json > ml-security-report.json || true
        safety check -r requirements.txt
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: python-security-reports
        path: |
          Backend/backend-security-report.json
          ML/ml-security-report.json

  node-security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd Frontend
        npm ci
    
    - name: Run npm audit
      run: |
        cd Frontend
        npm audit --audit-level=moderate --json > frontend-security-report.json || true
        npm audit --audit-level=moderate
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: node-security-report
        path: Frontend/frontend-security-report.json

  docker-security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker images
      run: |
        docker build -f docker/Dockerfile.backend -t vms-backend:scan .
        docker build -f docker/Dockerfile.frontend -t vms-frontend:scan .
        docker build -f docker/Dockerfile.ml -t vms-ml:scan .
    
    - name: Run Trivy vulnerability scanner on Backend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vms-backend:scan'
        format: 'sarif'
        output: 'backend-docker-scan.sarif'
    
    - name: Run Trivy vulnerability scanner on Frontend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vms-frontend:scan'
        format: 'sarif'
        output: 'frontend-docker-scan.sarif'
    
    - name: Run Trivy vulnerability scanner on ML
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vms-ml:scan'
        format: 'sarif'
        output: 'ml-docker-scan.sarif'
    
    - name: Upload Docker scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: '.'

  notify-security-issues:
    runs-on: ubuntu-latest
    needs: [python-security-scan, node-security-scan, docker-security-scan]
    if: failure()
    
    steps:
    - name: Notify security team
      uses: 8398a7/action-slack@v3
      with:
        status: 'failure'
        text: '🚨 Security vulnerabilities detected in dependencies. Please review the security scan results.'
        webhook_url: ${{ secrets.SECURITY_SLACK_WEBHOOK_URL }}
